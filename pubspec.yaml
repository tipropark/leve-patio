name: leve_patio
description: "Leve Mobilidade — Operação de Pátio (offline-first)"
publish_to: none

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # ── Core compartilhado (vendorizado em packages/) ─────────────────────────
  leve_core:
    path: packages/leve_core

  # ── State management ──────────────────────────────────────────────────────
  flutter_riverpod: ^3.3.1

  # ── Rede ──────────────────────────────────────────────────────────────────
  dio: ^5.9.2

  # ── Roteamento ────────────────────────────────────────────────────────────
  go_router: ^17.3.0

  # ── Banco local (offline-first) ───────────────────────────────────────────
  drift: ^2.22.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.4
  path: ^1.9.0

  # ── Auth / storage seguro ─────────────────────────────────────────────────
  flutter_secure_storage: ^10.3.1
  crypto: ^3.0.5

  # ── UUIDs gerados no dispositivo ─────────────────────────────────────────
  uuid: ^4.5.3

  # ── Conectividade ─────────────────────────────────────────────────────────
  connectivity_plus: ^7.0.0

  # ── QR code — leitura na saída ────────────────────────────────────────────
  mobile_scanner: ^7.2.0

  # ── QR code — geração no cupom de entrada ────────────────────────────────
  qr_flutter: ^4.1.0

  # ── Impressão térmica ESC/POS Bluetooth ───────────────────────────────────
  print_bluetooth_thermal: ^1.1.3

  # ── Permissões em runtime (Bluetooth API 31+, câmera) ────────────────────
  permission_handler: ^11.3.1

  # ── UI ────────────────────────────────────────────────────────────────────
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#E30613"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/
